# .github/workflows/cla.yml
# CLA Assistant — checks that external contributors have signed the CLA.
# Internal org members (Rise-AGI) are allowlisted and skip the check.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target')
      || (github.event_name == 'issue_comment'
          && (github.event.comment.body == 'recheck'
              || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/Rise-AGI/magnus/blob/main/CLA.md"
          branch: "main"
          allowlist: "parkcai,Renko6626,yujingyi68-cloud,dependabot[bot]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
